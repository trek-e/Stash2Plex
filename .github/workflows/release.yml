name: Release

on:
  push:
    tags:
      - 'v1.5.*'
      - 'v1.6.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine release branch
        id: branch
        run: |
          git fetch origin v1.x.x main
          if git branch -r --contains HEAD | grep -q 'origin/v1\.x\.x'; then
            echo "name=v1.x.x" >> "$GITHUB_OUTPUT"
          else
            echo "name=main" >> "$GITHUB_OUTPUT"
          fi

      - name: Switch to release branch
        run: git checkout ${{ steps.branch.outputs.name }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Update Stash2Plex.yml version
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.version }}/" Stash2Plex.yml

      - name: Build plugin zip
        run: |
          zip -r Stash2Plex.zip \
            Stash2Plex.py Stash2Plex.yml requirements.txt \
            worker/ sync_queue/ plex/ validation/ shared/ hooks/ reconciliation/ \
            -x '*/test*' '*/__pycache__/*' '*.pyc' '*/.pytest*'

      - name: Update index.yml
        run: |
          SHA=$(sha256sum Stash2Plex.zip | awk '{print $1}')
          DATE=$(date -u +"%Y-%m-%d %H:%M:%S")
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          PATH_URL="https://github.com/trek-e/Stash2Plex/releases/download/${TAG}/Stash2Plex.zip"
          sed -i "s/^  version: .*/  version: ${VERSION}/" index.yml
          sed -i "s/^  date: .*/  date: \"${DATE}\"/" index.yml
          sed -i "s|^  path: .*|  path: ${PATH_URL}|" index.yml
          sed -i "s/^  sha256: .*/  sha256: ${SHA}/" index.yml

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Stash2Plex.yml index.yml
          git diff --cached --quiet || git commit -m "chore: update plugin index for v${{ steps.version.outputs.version }}"
          git push origin HEAD:${{ steps.branch.outputs.name }}

      - name: Mirror index.yml to main
        run: |
          BRANCH_COMMIT=$(git rev-parse HEAD)
          git fetch origin main
          git checkout origin/main -b _main_mirror
          git checkout "$BRANCH_COMMIT" -- index.yml Stash2Plex.yml
          git commit -m "chore: update plugin index for v${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${GITHUB_REF_NAME}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" "${PREV_TAG}..${GITHUB_REF_NAME}" -- '*.py' '*.yml' ':!tests/' ':!.github/' | grep -v "^- chore:" || true)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="- Bug fixes and improvements"
          fi
          {
            echo "body<<EOF"
            echo "### Changes"
            echo ""
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body: ${{ steps.notes.outputs.body }}
          files: Stash2Plex.zip
